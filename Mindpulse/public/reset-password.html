<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mindpulse — Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">🧘 Mindpulse</div>
      <h2 class="auth-page-subtitle">Set a new password</h2>

      <form id="reset-form" novalidate>
        <div class="form-group">
          <label for="new-password">New Password</label>
          <div class="password-wrapper">
            <input type="password" id="new-password" placeholder="••••••••" autocomplete="new-password" required minlength="6" />
            <button type="button" class="toggle-pw" aria-label="Show password" onclick="togglePw('new-password', this)">👁</button>
          </div>
        </div>
        <div class="form-error" id="reset-error" role="alert" aria-live="polite"></div>
        <div class="form-success" id="reset-success" role="status" aria-live="polite"></div>
        <div class="form-group mt-2">
          <button type="submit" class="btn btn-primary btn-full" id="reset-btn">Update Password</button>
        </div>
      </form>
      <div class="auth-back-link">
        <a href="/" class="auth-link">Back to login</a>
      </div>
    </div>
  </div>

  <script src="/script.js"></script>
  <script>
    // Show page immediately — this is a public page
    document.documentElement.style.visibility = 'visible';

    const token = new URLSearchParams(location.search).get('token');
    if (!token) {
      document.getElementById('reset-error').textContent = 'Invalid or missing reset token.';
      document.getElementById('reset-btn').disabled = true;
    }

    document.getElementById('reset-form').addEventListener('submit', async e => {
      e.preventDefault();
      const errEl = document.getElementById('reset-error');
      const okEl  = document.getElementById('reset-success');
      errEl.textContent = ''; okEl.textContent = '';
      const password = document.getElementById('new-password').value;
      if (!password || password.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; return; }
      const btn = document.getElementById('reset-btn');
      btn.disabled = true; btn.textContent = 'Updating…';
      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });
        const data = await res.json();
        if (!res.ok) { errEl.textContent = data.error || 'Reset failed.'; return; }
        okEl.textContent = data.message + ' Redirecting to login…';
        setTimeout(() => window.location.href = '/', 2500);
      } catch { errEl.textContent = 'Network error. Please try again.'; }
      finally { btn.disabled = false; btn.textContent = 'Update Password'; }
    });

    function togglePw(id, btn) {
      const input = document.getElementById(id);
      const show = input.type === 'password';
      input.type = show ? 'text' : 'password';
      btn.textContent = show ? '🙈' : '👁';
      btn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
    }
  </script>
</body>
</html>
