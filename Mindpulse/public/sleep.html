<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sleep Sounds — Mindpulse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="app-layout">
    <nav id="sidebar"></nav>
    <div class="main-content">
      <header id="topbar"></header>
      <div class="page-body">
        <h1 class="page-title">Sleep Sounds</h1>
        <p class="page-subtitle">Choose an ambient sound to help you relax and drift off to sleep.</p>

        <div class="card">
          <div class="sounds-grid" id="sounds-grid"></div>

          <!-- Auto-stop duration -->
          <div class="sleep-autostop-section">
            <div class="sleep-autostop-label">Auto-Stop Timer</div>
            <div class="sleep-autostop-row">
              <button class="dur-btn active" data-stop="0">Off</button>
              <button class="dur-btn" data-stop="15">15 min</button>
              <button class="dur-btn" data-stop="30">30 min</button>
              <button class="dur-btn" data-stop="45">45 min</button>
              <button class="dur-btn" data-stop="60">60 min</button>
              <span id="sleep-timer-display" class="sleep-timer-display"></span>
            </div>
          </div>

          <div class="volume-control">
            <label for="volume-slider">🔊 Volume</label>
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.3" />
          </div>
        </div>
      </div>
    </div>
  </div>

  <button class="sidebar-hamburger" aria-label="Toggle menu"
    onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>

  <script src="/script.js"></script>
  <script>
    requireAuth();

    const SOUNDS = [
      { id:'rain',        label:'Rain',        icon:'🌧️', src:'/audio/rain.wav' },
      { id:'ocean',       label:'Ocean',       icon:'🌊', src:'/audio/ocean.wav' },
      { id:'forest',      label:'Forest',      icon:'🌲', src:'/audio/forest.wav' },
      { id:'brown-noise', label:'Brown Noise', icon:'🤎', src:'/audio/brown-noise.wav' },
      { id:'ambient',     label:'Ambient',     icon:'✨', src:'/audio/ambient.wav' },
    ];

    const state = { activeSound: null };

    // Set default volume
    MindpulseAudio.setVolume(0.3);

    const grid = document.getElementById('sounds-grid');
    SOUNDS.forEach(s => {
      const card = document.createElement('div');
      card.className = 'sound-card'; card.id = `card-${s.id}`;
      card.setAttribute('role','button'); card.setAttribute('tabindex','0');
      card.setAttribute('aria-label', `Play ${s.label}`);
      card.innerHTML = `<div class="sound-icon">${s.icon}</div><div class="sound-name">${s.label}</div>`;
      card.addEventListener('click', () => handleClick(s.id));
      card.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' ') { e.preventDefault(); handleClick(s.id); } });
      grid.appendChild(card);
    });

    function stopActive() {
      if (!state.activeSound) return;
      MindpulseAudio.stop();
      const card = document.getElementById(`card-${state.activeSound}`);
      if (card) card.classList.remove('active');
      state.activeSound = null;
      clearAutoStop();
    }

    function handleClick(id) {
      const card = document.getElementById(`card-${id}`);
      if (state.activeSound === id) { stopActive(); return; }
      stopActive();
      state.activeSound = id;
      if (card) card.classList.add('active');
      const sound = SOUNDS.find(s => s.id === id);
      if (sound) MindpulseAudio.play(sound.src, { loop: true });
    }

    document.getElementById('volume-slider').addEventListener('input', e => {
      MindpulseAudio.setVolume(parseFloat(e.target.value));
    });

    // Auto-stop timer
    let autoStopId = null, autoStopRemaining = 0;
    const timerDisplay = document.getElementById('sleep-timer-display');

    function clearAutoStop() {
      if (autoStopId) { clearInterval(autoStopId); autoStopId = null; }
      timerDisplay.textContent = '';
    }

    function startAutoStop(minutes) {
      clearAutoStop();
      if (!minutes) return;
      autoStopRemaining = minutes * 60;
      autoStopId = setInterval(() => {
        if (autoStopRemaining <= 0) {
          clearAutoStop();
          stopActive();
          document.querySelectorAll('.dur-btn[data-stop]').forEach(b => b.classList.toggle('active', b.dataset.stop === '0'));
          return;
        }
        autoStopRemaining--;
        const m = Math.floor(autoStopRemaining / 60);
        const s = autoStopRemaining % 60;
        timerDisplay.textContent = `Stops in ${m}:${String(s).padStart(2,'0')}`;
      }, 1000);
    }

    document.querySelectorAll('.dur-btn[data-stop]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.dur-btn[data-stop]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        startAutoStop(parseInt(btn.dataset.stop));
      });
    });

    // Cleanup on page unload
    window.addEventListener('pagehide', () => {
      clearAutoStop();
      MindpulseAudio.stop();
    });

    async function init() {
      try {
        const res = await apiFetch('/api/user/profile');
        const data = await res.json();
        renderSidebar(); renderTopbar(data.name || '');
      } catch(_) { renderSidebar(); renderTopbar(''); }
    }

    init();
  </script>
</body>
</html>
